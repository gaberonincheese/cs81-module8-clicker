<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Dog Collector Time!</title>
</head>

<body style="font-family: cursive; text-align: center; padding-top: 60px; background-color: rgb(114, 219, 252);">

    <h1>Dog Collector Time!</h1>

    <p> <span id="text"> Get ready to collect some dogs! </span> </p>
    <p> Dog count: <span id="numDogs"> 0 </span> </p>

    <button style="font-size: 50px; width: 200px; height: 100px" id="dogButton"> 🐕 </button>

    <script>
        let collectedDogs = 0;
        const dogButton = document.getElementById("dogButton");
        //const dogBark = new Audio("dragon-studio-dog-bark-382732.mp3");
        const dogBarks = ["dragon-studio-dog-bark-382732.mp3", "alexzavesa-dog-bark-5-468445.mp3",
            "dragon-studio-free-dog-bark-419014.mp3", "freesound_community-sniffing-dog-102739.mp3", 
            "yodguard-friendly-small-dog-bark-1-535470.mp3"];
        let currentBark = null;

        dogButton.addEventListener("click", () => {
            collectedDogs++;
            document.getElementById("numDogs").innerHTML = collectedDogs;

            if (collectedDogs == 5) {
               setText("You're just now beginning your dog-collecting journey!");
               playBark();
            } else if (collectedDogs == 25) {
                setText("Gee, you're gonna need a bigger space to accommodate all these dogs!");
                playBark();
            } else if (collectedDogs == 50) {
                setText("Slow down, bucko! There's so many dogs they're spilling out the door!")
                playBark();
            } else if (collectedDogs == 100) {
                setText("The dogs are overtaking you! I can't even see you in between all the dogs!");
                playBark();
            }
        })

        function setText(chosenText) {
            document.getElementById("text").innerHTML = chosenText;
            //dogButton.addEventListener("click", dogBark.play());
        }

        function playBark() {
            if (currentBark) {
                currentBark.pause();
                currentBark.currentTime = 0;
            }

            const audioIndex = Math.floor(Math.random() * dogBarks.length);
            const newBark = new Audio(dogBarks[audioIndex]);
                
            currentBark = newBark;

            dogButton.addEventListener("click", currentBark.play());     
        }

    </script>

</body>

</html>
